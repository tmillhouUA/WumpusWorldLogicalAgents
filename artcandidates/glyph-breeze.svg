<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- BREEZE glyph — the pit's swirling blue wind arcs, standalone (no pit).
       A compact cluster of ~60-deg partial circles at varied radii around the
       center, low-opacity blue, same style as the pit's wind. -->
  <title>Breeze — swirling wind</title>
  <g fill="none" stroke="#6aa8e0" stroke-linecap="round">
    <!-- concentric-ish swirl: partial arcs at growing radii, offset angles -->
    <path d="M50 34 A 16 16 0 0 1 66 50"   stroke-width="2.0" opacity="0.55"/>
    <path d="M62 62 A 16 16 0 0 1 42 65"   stroke-width="1.8" opacity="0.5"/>
    <path d="M34 58 A 12 12 0 0 1 38 40"   stroke-width="1.7" opacity="0.5"/>
    <path d="M44 28 A 22 22 0 0 1 72 44"   stroke-width="1.6" opacity="0.4"/>
    <path d="M70 58 A 22 22 0 0 1 50 74"   stroke-width="1.5" opacity="0.4"/>
    <path d="M40 74 A 22 22 0 0 1 26 52"   stroke-width="1.5" opacity="0.4"/>
    <path d="M28 40 A 22 22 0 0 1 46 26"   stroke-width="1.4" opacity="0.35"/>
    <path d="M48 20 A 30 30 0 0 1 78 42"   stroke-width="1.3" opacity="0.3"/>
    <path d="M76 60 A 30 30 0 0 1 50 80"   stroke-width="1.3" opacity="0.3"/>
    <path d="M40 80 A 30 30 0 0 1 22 50"   stroke-width="1.2" opacity="0.28"/>
    <path d="M22 44 A 30 30 0 0 1 44 20"   stroke-width="1.2" opacity="0.28"/>
  </g>
</svg>
