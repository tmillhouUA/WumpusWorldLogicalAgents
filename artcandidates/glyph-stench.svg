  <!-- STENCH glyph — rising wisps that WAFT UPWARD. Each wisp is its OWN nested
       <svg> (its own coordinate space + viewport, overflow:hidden clips it to
       its window). Inside, a tall vertical sine wave scrolls up by exactly one
       wavelength on a loop — seamless, since a sine is identical after a
       one-wavelength shift, and the wave extends well past the window so it's
       always full. Nested svgs keep each wisp fully isolated. -->
