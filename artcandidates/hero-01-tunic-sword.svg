<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 01: Classic green-tunic peasant, drawn sword, small round shield.
       The most "Link" of the set: hooded green tunic, leather belt, bare
       arms, a plain short sword raised. -->
  <title>Hero 01 — green tunic, drawn sword</title>
  <!-- shadow -->
  <ellipse cx="50" cy="93" rx="20" ry="4" fill="#000" opacity="0.35"/>
  <!-- legs -->
  <path d="M42 66 L40 88 L47 88 L49 68 Z" fill="#5a4327"/>
  <path d="M58 66 L60 88 L53 88 L51 68 Z" fill="#4c3820"/>
  <!-- boots -->
  <path d="M39 86 L48 86 L48 91 L37 91 Z" fill="#3a2b18"/>
  <path d="M61 86 L52 86 L52 91 L63 91 Z" fill="#312414"/>
  <!-- tunic body -->
  <path d="M36 44 Q50 40 64 44 L61 68 Q50 72 39 68 Z" fill="#3f7d3a"/>
  <!-- tunic hem points -->
  <path d="M39 66 L44 74 L49 66 L54 74 L59 66 L61 68 Q50 72 39 68 Z" fill="#356b31"/>
  <!-- belt -->
  <rect x="38" y="60" width="24" height="5" fill="#5a3d1e"/>
  <rect x="47" y="60" width="6" height="5" fill="#c9a84c"/>
  <!-- arms -->
  <path d="M36 46 L28 60 L33 62 L41 49 Z" fill="#c98d5a"/>
  <path d="M64 46 L72 34 L77 37 L69 50 Z" fill="#c98d5a"/>
  <!-- hood collar / shoulders -->
  <path d="M40 42 Q50 36 60 42 L58 47 Q50 43 42 47 Z" fill="#356b31"/>
  <!-- head -->
  <circle cx="50" cy="33" r="9" fill="#e0b083"/>
  <!-- hood -->
  <path d="M40 33 Q41 20 50 20 Q59 20 60 33 L57 30 Q50 25 43 30 Z" fill="#3f7d3a"/>
  <!-- hair fringe -->
  <path d="M43 29 Q50 26 57 29 L55 32 Q50 30 45 32 Z" fill="#8a6a3a"/>
  <!-- eyes -->
  <circle cx="47" cy="34" r="1.2" fill="#2a2018"/>
  <circle cx="53" cy="34" r="1.2" fill="#2a2018"/>
  <!-- sword (raised in right hand) -->
  <rect x="74" y="12" width="3" height="26" fill="#cfd6dd"/>
  <polygon points="74,12 77,12 75.5,8" fill="#eef2f6"/>
  <rect x="70" y="36" width="11" height="3" fill="#5a3d1e"/>
  <rect x="74.5" y="38" width="2" height="5" fill="#3a2b18"/>
  <!-- shield (left arm) -->
  <circle cx="30" cy="60" r="9" fill="#7a5c1e"/>
  <circle cx="30" cy="60" r="9" fill="none" stroke="#c9a84c" stroke-width="1.5"/>
  <circle cx="30" cy="60" r="2.5" fill="#c9a84c"/>
</svg>
