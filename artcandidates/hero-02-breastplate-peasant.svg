<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 02: Peasant who strapped a mismatched steel breastplate over a brown
       tunic. Armor sits a little loose — clearly borrowed/scavenged. Spear
       at rest. -->
  <title>Hero 02 — scavenged breastplate over tunic</title>
  <ellipse cx="50" cy="93" rx="20" ry="4" fill="#000" opacity="0.35"/>
  <!-- legs (rough trousers) -->
  <path d="M42 66 L40 88 L47 88 L49 68 Z" fill="#6b5636"/>
  <path d="M58 66 L60 88 L53 88 L51 68 Z" fill="#5c4a2e"/>
  <!-- boots -->
  <path d="M39 86 L48 86 L48 91 L37 91 Z" fill="#3a2b18"/>
  <path d="M61 86 L52 86 L52 91 L63 91 Z" fill="#312414"/>
  <!-- tunic under armor -->
  <path d="M37 45 Q50 41 63 45 L61 68 Q50 72 39 68 Z" fill="#8a5a34"/>
  <!-- breastplate (steel, slightly oversized) -->
  <path d="M39 46 Q50 42 61 46 L60 62 Q50 66 40 62 Z" fill="#9aa3ab"/>
  <path d="M39 46 Q50 42 61 46 L60 50 Q50 47 40 50 Z" fill="#b8c0c7"/>
  <line x1="50" y1="44" x2="50" y2="65" stroke="#6f767c" stroke-width="1"/>
  <!-- pauldron straps -->
  <path d="M40 47 L44 43 L46 46 L42 50 Z" fill="#7a828a"/>
  <path d="M60 47 L56 43 L54 46 L58 50 Z" fill="#7a828a"/>
  <!-- arms -->
  <path d="M39 48 L31 62 L36 64 L44 51 Z" fill="#c98d5a"/>
  <path d="M61 48 L69 62 L64 64 L56 51 Z" fill="#c98d5a"/>
  <!-- head -->
  <circle cx="50" cy="33" r="9" fill="#e0b083"/>
  <!-- shaggy hair -->
  <path d="M40 32 Q41 21 50 21 Q59 21 60 32 L57 29 Q50 24 43 29 Z" fill="#6a4a28"/>
  <path d="M41 30 Q45 27 50 28 Q55 27 59 30 L57 34 Q50 31 43 34 Z" fill="#7a5a34"/>
  <circle cx="47" cy="34" r="1.2" fill="#2a2018"/>
  <circle cx="53" cy="34" r="1.2" fill="#2a2018"/>
  <!-- spear (right hand, vertical) -->
  <rect x="70" y="20" width="2.5" height="52" fill="#6b4c26"/>
  <polygon points="71.2,12 68,22 74.5,22" fill="#c6ced4"/>
</svg>
