<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 05: Calm standing hero, bow held at side in one hand (ready, not
       drawn). Green hooded tunic, leather chest strap, quiver. A steady
       "idle" pose — reads well as the resting player token. -->
  <title>Hero 05 — standing, bow at side</title>
  <ellipse cx="50" cy="93" rx="19" ry="4" fill="#000" opacity="0.35"/>
  <path d="M43 66 L41 88 L48 88 L49 68 Z" fill="#5a4327"/>
  <path d="M57 66 L59 88 L52 88 L51 68 Z" fill="#4c3820"/>
  <path d="M40 86 L49 86 L49 91 L38 91 Z" fill="#3a2b18"/>
  <path d="M60 86 L51 86 L51 91 L62 91 Z" fill="#312414"/>
  <!-- tunic -->
  <path d="M37 45 Q50 41 63 45 L61 68 Q50 72 39 68 Z" fill="#3f7d3a"/>
  <path d="M39 66 L44 73 L49 66 L54 73 L59 66 L61 68 Q50 72 39 68 Z" fill="#356b31"/>
  <!-- diagonal quiver strap -->
  <path d="M40 45 L61 66 L58 68 L37 47 Z" fill="#5a3d1e" opacity="0.85"/>
  <rect x="38" y="60" width="24" height="4" fill="#5a3d1e"/>
  <rect x="47" y="60" width="6" height="4" fill="#c9a84c"/>
  <!-- quiver over shoulder -->
  <rect x="60" y="36" width="6" height="18" rx="2" fill="#6b4c26" transform="rotate(10 63 45)"/>
  <line x1="64" y1="37" x2="67" y2="30" stroke="#8a6a3a" stroke-width="1"/>
  <line x1="62" y1="37" x2="64" y2="29" stroke="#8a6a3a" stroke-width="1"/>
  <!-- arms -->
  <path d="M37 47 L29 62 L34 64 L42 50 Z" fill="#c98d5a"/>
  <path d="M63 47 L71 60 L66 62 L58 50 Z" fill="#c98d5a"/>
  <!-- head + hood -->
  <circle cx="50" cy="33" r="9" fill="#e0b083"/>
  <path d="M40 33 Q41 20 50 20 Q59 20 60 33 L57 30 Q50 25 43 30 Z" fill="#3f7d3a"/>
  <path d="M43 29 Q50 26 57 29 L55 32 Q50 30 45 32 Z" fill="#8a6a3a"/>
  <circle cx="47" cy="34" r="1.2" fill="#2a2018"/>
  <circle cx="53" cy="34" r="1.2" fill="#2a2018"/>
  <!-- bow held in left hand, vertical -->
  <path d="M28 46 Q19 62 28 78" fill="none" stroke="#6b4c26" stroke-width="2.5"/>
  <line x1="28" y1="46" x2="28" y2="78" stroke="#d8d2c0" stroke-width="0.7"/>
</svg>
