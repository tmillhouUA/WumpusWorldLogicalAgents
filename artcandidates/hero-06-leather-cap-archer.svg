  <ellipse cx="50" cy="93" rx="19" ry="4" fill="#000" opacity="0.35"/>
  <path d="M43 66 L41 88 L48 88 L49 68 Z" fill="#6b5636"/>
  <path d="M57 66 L59 88 L52 88 L51 68 Z" fill="#5c4a2e"/>
  <path d="M40 86 L49 86 L49 91 L38 91 Z" fill="#3a2b18"/>
  <path d="M60 86 L51 86 L51 91 L62 91 Z" fill="#312414"/>
  <!-- tunic -->
  <path d="M37 45 Q50 41 63 45 L61 68 Q50 72 39 68 Z" fill="#9a8452"/>
  <!-- studded leather jerkin over it -->
  <path d="M39 46 Q50 42 61 46 L59 63 Q50 66 41 63 Z" fill="#6b4c26"/>
  <circle cx="45" cy="50" r="1" fill="#c9a84c"/>
  <circle cx="55" cy="50" r="1" fill="#c9a84c"/>
  <circle cx="45" cy="57" r="1" fill="#c9a84c"/>
  <circle cx="55" cy="57" r="1" fill="#c9a84c"/>
  <circle cx="50" cy="53" r="1" fill="#c9a84c"/>
  <rect x="39" y="61" width="22" height="4" fill="#4a3218"/>
  <!-- arms -->
  <path d="M37 47 L28 60 L33 62 L42 50 Z" fill="#c98d5a"/>
  <path d="M63 47 L72 58 L67 61 L58 50 Z" fill="#c98d5a"/>
