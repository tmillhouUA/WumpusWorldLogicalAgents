<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 06: Rustic ranger — leather cap, studded leather jerkin over a
       homespun tunic, bow in hand. Leans "hunter from the village" more than
       knight. Warmer earth palette. -->
