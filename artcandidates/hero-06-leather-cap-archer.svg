  <path d="M40 32 Q41 22 50 22 Q59 22 60 32 L57 30 Q50 27 43 30 Z" fill="#5a3d1e"/>
  <path d="M40 31 L60 31 L60 34 L40 34 Z" fill="#4a3218"/>
  <path d="M59 24 Q64 20 63 27 Q61 26 59 27 Z" fill="#3f7d3a"/>
  <circle cx="47" cy="34" r="1.2" fill="#2a2018"/>
  <circle cx="53" cy="34" r="1.2" fill="#2a2018"/>
  <!-- little chin scruff -->
  <path d="M46 39 Q50 42 54 39 Q50 41 46 39 Z" fill="#6a4a28"/>
