<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 07: A step more armored — mail shirt over the tunic, simple nasal
       helm, bow slung across the back (hands free). The "peasant who found a
       dead soldier's kit" idea, tidied up. -->
  <title>Hero 07 — mail shirt, helm, bow on back</title>
  <ellipse cx="50" cy="93" rx="19" ry="4" fill="#000" opacity="0.35"/>
  <path d="M43 66 L41 88 L48 88 L49 68 Z" fill="#5a4327"/>
  <path d="M57 66 L59 88 L52 88 L51 68 Z" fill="#4c3820"/>
  <path d="M40 86 L49 86 L49 91 L38 91 Z" fill="#3a2b18"/>
  <path d="M60 86 L51 86 L51 91 L62 91 Z" fill="#312414"/>
  <!-- bow across back (behind body) -->
  <path d="M33 40 Q26 60 35 78" fill="none" stroke="#6b4c26" stroke-width="2.5"/>
  <line x1="33" y1="40" x2="35" y2="78" stroke="#d8d2c0" stroke-width="0.7"/>
  <!-- mail shirt -->
  <path d="M37 45 Q50 41 63 45 L61 68 Q50 72 39 68 Z" fill="#8a929a"/>
  <!-- mail texture dots -->
  <g fill="#6f767c">
    <circle cx="43" cy="50" r="0.8"/><circle cx="48" cy="50" r="0.8"/><circle cx="53" cy="50" r="0.8"/><circle cx="57" cy="50" r="0.8"/>
    <circle cx="45" cy="55" r="0.8"/><circle cx="50" cy="55" r="0.8"/><circle cx="55" cy="55" r="0.8"/>
    <circle cx="43" cy="60" r="0.8"/><circle cx="48" cy="60" r="0.8"/><circle cx="53" cy="60" r="0.8"/><circle cx="57" cy="60" r="0.8"/>
  </g>
  <!-- tunic hem peeking below mail -->
  <path d="M40 66 L44 72 L50 66 L56 72 L60 66 L61 68 Q50 72 40 68 Z" fill="#3f7d3a"/>
  <rect x="39" y="62" width="22" height="4" fill="#5a3d1e"/>
  <!-- arms -->
  <path d="M37 47 L30 62 L35 64 L42 50 Z" fill="#c98d5a"/>
  <path d="M63 47 L70 62 L65 64 L58 50 Z" fill="#c98d5a"/>
  <!-- head + nasal helm -->
  <circle cx="50" cy="33" r="9" fill="#e0b083"/>
  <path d="M40 33 Q40 21 50 21 Q60 21 60 33 L60 30 Q50 26 40 30 Z" fill="#9aa3ab"/>
  <rect x="49" y="30" width="2" height="9" fill="#7a828a"/>
  <path d="M40 30 L60 30 L60 33 L40 33 Z" fill="#b8c0c7"/>
  <circle cx="46" cy="35" r="1.2" fill="#2a2018"/>
  <circle cx="54" cy="35" r="1.2" fill="#2a2018"/>
</svg>
