<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 08: THE delver pose (user's suggestion) — bow and quiver slung on the
       back, lantern thrust forward in one outstretched hand, body leaning
       into the darkness to peer ahead. Green hooded tunic. Best captures the
       Wumpus-world loop: probing the unknown with light while armed. -->
  <title>Hero 08 — leaning forward, lantern out, bow on back</title>
  <ellipse cx="52" cy="93" rx="21" ry="4" fill="#000" opacity="0.35"/>

  <!-- BACK GEAR (drawn first, behind body) -->
  <!-- bow slung diagonally on back -->
  <path d="M64 40 Q74 55 63 72" fill="none" stroke="#6b4c26" stroke-width="2.5"/>
  <line x1="64" y1="40" x2="63" y2="72" stroke="#d8d2c0" stroke-width="0.7"/>
  <!-- quiver on back, arrows fanning up -->
  <rect x="60" y="44" width="6" height="18" rx="2" fill="#5a3d1e" transform="rotate(16 63 53)"/>
  <line x1="66" y1="44" x2="70" y2="36" stroke="#8a6a3a" stroke-width="1"/>
  <line x1="64" y1="43" x2="67" y2="35" stroke="#8a6a3a" stroke-width="1"/>
  <line x1="62" y1="43" x2="64" y2="34" stroke="#8a6a3a" stroke-width="1"/>

  <!-- legs, forward-lean stance (front leg planted, back leg trailing) -->
  <path d="M50 66 L44 88 L51 88 L55 68 Z" fill="#5a4327"/>
  <path d="M58 64 L66 82 L60 85 L54 67 Z" fill="#4c3820"/>
  <path d="M43 86 L52 86 L52 91 L41 91 Z" fill="#3a2b18"/>
  <path d="M67 80 L59 83 L61 87 L69 84 Z" fill="#312414"/>

  <!-- tunic body, tilted forward -->
  <path d="M42 46 Q55 41 66 47 L62 68 Q51 71 44 66 Z" fill="#3f7d3a"/>
  <path d="M44 65 L48 71 L53 65 L58 70 L62 68 Q51 71 44 66 Z" fill="#356b31"/>
  <rect x="44" y="60" width="20" height="4" fill="#5a3d1e" transform="rotate(-6 54 62)"/>

  <!-- rear arm (bent, near body) -->
  <path d="M60 49 L66 60 L62 62 L56 52 Z" fill="#c98d5a"/>

  <!-- head + hood, craned forward to look -->
  <circle cx="41" cy="35" r="9" fill="#e0b083"/>
  <path d="M32 36 Q31 23 41 22 Q51 22 50 34 L47 31 Q40 28 35 33 Z" fill="#3f7d3a"/>
  <path d="M34 32 Q40 29 46 31 L44 34 Q40 32 36 35 Z" fill="#8a6a3a"/>
  <circle cx="38" cy="36" r="1.2" fill="#2a2018"/>
  <circle cx="43" cy="36" r="1.2" fill="#2a2018"/>

  <!-- FRONT arm outstretched, holding lantern into the dark -->
  <path d="M44 50 L24 58 L26 62 L46 55 Z" fill="#c98d5a"/>
  <!-- lantern -->
  <path d="M22 55 Q24 51 26 55" fill="none" stroke="#5a3d1e" stroke-width="1"/>
  <rect x="20" y="55" width="9" height="11" rx="1" fill="#5a3d1e"/>
  <rect x="21.5" y="56.5" width="6" height="8" fill="#ffcf6b"/>
  <ellipse cx="24.5" cy="60.5" rx="2.2" ry="3" fill="#fff2b0"/>
  <!-- lantern glow reaching forward into darkness -->
  <circle cx="24.5" cy="60.5" r="15" fill="#ffcf6b" opacity="0.14"/>
  <circle cx="24.5" cy="60.5" r="8" fill="#ffcf6b" opacity="0.14"/>
</svg>
