<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 09: Same lean-and-peer delver pose as 08, but a touch more "took up a
       quest" — a gold-trimmed tabard over the tunic and a shoulder pauldron,
       bow + quiver on back, lantern out. Slightly more heroic dress-up. -->
  <title>Hero 09 — lantern lean, tabard + pauldron, bow on back</title>
  <ellipse cx="52" cy="93" rx="21" ry="4" fill="#000" opacity="0.35"/>

  <!-- back gear -->
  <path d="M64 40 Q74 55 63 72" fill="none" stroke="#6b4c26" stroke-width="2.5"/>
  <line x1="64" y1="40" x2="63" y2="72" stroke="#d8d2c0" stroke-width="0.7"/>
  <rect x="60" y="44" width="6" height="18" rx="2" fill="#5a3d1e" transform="rotate(16 63 53)"/>
  <line x1="66" y1="44" x2="70" y2="36" stroke="#8a6a3a" stroke-width="1"/>
  <line x1="64" y1="43" x2="67" y2="35" stroke="#8a6a3a" stroke-width="1"/>

  <!-- legs -->
  <path d="M50 66 L44 88 L51 88 L55 68 Z" fill="#5a4327"/>
  <path d="M58 64 L66 82 L60 85 L54 67 Z" fill="#4c3820"/>
  <path d="M43 86 L52 86 L52 91 L41 91 Z" fill="#3a2b18"/>
  <path d="M67 80 L59 83 L61 87 L69 84 Z" fill="#312414"/>

  <!-- tunic -->
  <path d="M42 46 Q55 41 66 47 L62 68 Q51 71 44 66 Z" fill="#8a5a34"/>
  <!-- tabard (gold-trimmed) over the tunic -->
  <path d="M47 46 L59 48 L57 70 L50 71 L46 66 Z" fill="#3a5f8a"/>
  <path d="M47 46 L59 48 L58.5 51 L47 49 Z" fill="#c9a84c"/>
  <line x1="52" y1="48" x2="53" y2="70" stroke="#2f4d70" stroke-width="0.8"/>
  <rect x="44" y="60" width="20" height="4" fill="#5a3d1e" transform="rotate(-6 54 62)"/>

  <!-- shoulder pauldron on rear arm -->
  <path d="M58 47 Q64 45 65 51 L60 52 Z" fill="#9aa3ab"/>
  <path d="M60 49 L66 60 L62 62 L56 52 Z" fill="#c98d5a"/>

  <!-- head + hood craned forward -->
  <circle cx="41" cy="35" r="9" fill="#e0b083"/>
  <path d="M32 36 Q31 23 41 22 Q51 22 50 34 L47 31 Q40 28 35 33 Z" fill="#8a5a34"/>
  <path d="M34 32 Q40 29 46 31 L44 34 Q40 32 36 35 Z" fill="#6a4a28"/>
  <circle cx="38" cy="36" r="1.2" fill="#2a2018"/>
  <circle cx="43" cy="36" r="1.2" fill="#2a2018"/>

  <!-- front arm + lantern -->
  <path d="M46 50 L26 58 L28 62 L48 55 Z" fill="#c98d5a"/>
  <path d="M24 55 Q26 51 28 55" fill="none" stroke="#5a3d1e" stroke-width="1"/>
  <rect x="22" y="55" width="9" height="11" rx="1" fill="#5a3d1e"/>
  <rect x="23.5" y="56.5" width="6" height="8" fill="#ffcf6b"/>
  <ellipse cx="26.5" cy="60.5" rx="2.2" ry="3" fill="#fff2b0"/>
  <circle cx="26.5" cy="60.5" r="15" fill="#ffcf6b" opacity="0.14"/>
  <circle cx="26.5" cy="60.5" r="8" fill="#ffcf6b" opacity="0.14"/>
</svg>
