<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 10a: revision of #10 with the four fixes —
       (1) a short neck between head and tunic,
       (2) lantern HANGS from the fingers (bail + drop-line),
       (3) bow diagonal ACROSS the back; quiver behind the RIGHT shoulder
           (viewer's right), arrows fanning up over it,
       (4) shadow centered under the feet (no float). -->
  <title>Hero 10a — chibi delver, fixes applied</title>

  <!-- shadow, centered under the feet -->
  <ellipse cx="50" cy="88" rx="17" ry="3.6" fill="#000" opacity="0.35"/>

  <!-- BACK GEAR (behind body) -->
  <!-- bow: diagonal across the back, upper-left to lower-right -->
  <path d="M34 44 Q30 58 40 72" fill="none" stroke="#6b4c26" stroke-width="2.5"/>
  <line x1="34" y1="44" x2="40" y2="72" stroke="#d8d2c0" stroke-width="0.7"/>
  <!-- quiver behind the RIGHT (viewer-right) shoulder, arrows fanning up -->
  <rect x="60" y="46" width="6" height="17" rx="2" fill="#5a3d1e" transform="rotate(18 63 54)"/>
  <line x1="66" y1="47" x2="71" y2="39" stroke="#8a6a3a" stroke-width="1"/>
  <line x1="64" y1="46" x2="68" y2="37" stroke="#8a6a3a" stroke-width="1"/>
  <line x1="62" y1="46" x2="65" y2="36" stroke="#8a6a3a" stroke-width="1"/>

  <!-- stubby legs -->
  <path d="M45 70 L43 84 L49 84 L50 71 Z" fill="#5a4327"/>
  <path d="M55 70 L57 84 L51 84 L50 71 Z" fill="#4c3820"/>
  <ellipse cx="45" cy="85.5" rx="4" ry="2.5" fill="#3a2b18"/>
  <ellipse cx="55" cy="85.5" rx="4" ry="2.5" fill="#312414"/>

  <!-- tunic body -->
  <path d="M42 56 Q50 53 58 56 L56 71 Q50 74 44 71 Z" fill="#3f7d3a"/>
  <path d="M44 69 L47 73 L50 69 L53 73 L56 71 Q50 74 44 71 Z" fill="#356b31"/>
  <rect x="43" y="66" width="14" height="3" fill="#5a3d1e"/>

  <!-- NECK (between head and collar) -->
  <rect x="46" y="50" width="7" height="7" rx="1.5" fill="#d9a978"/>

  <!-- rear arm -->
  <path d="M56 58 L60 66 L57 67 L53 60 Z" fill="#c98d5a"/>

  <!-- BIG head + hood -->
  <circle cx="49" cy="38" r="14" fill="#e0b083"/>
  <path d="M35 39 Q34 20 49 20 Q64 20 63 37 L58 32 Q49 26 41 33 Z" fill="#3f7d3a"/>
  <path d="M38 34 Q49 29 60 34 L57 38 Q49 34 41 38 Z" fill="#8a6a3a"/>
  <circle cx="45" cy="40" r="2" fill="#2a2018"/>
  <circle cx="54" cy="40" r="2" fill="#2a2018"/>
  <circle cx="45.6" cy="39.3" r="0.6" fill="#fff"/>
  <circle cx="54.6" cy="39.3" r="0.6" fill="#fff"/>

  <!-- front arm reaching forward, palm down to hold the bail -->
  <path d="M45 60 L31 63 L32 67 L46 65 Z" fill="#c98d5a"/>
  <!-- hand -->
  <circle cx="31.5" cy="65" r="2.4" fill="#d9a978"/>

  <!-- LANTERN, hanging BELOW the hand -->
  <!-- drop-line from fingers to the bail -->
  <line x1="31.5" y1="66.5" x2="31.5" y2="70" stroke="#3a2b18" stroke-width="0.8"/>
  <!-- bail (handle arc) -->
  <path d="M27.5 71 Q31.5 66 35.5 71" fill="none" stroke="#5a3d1e" stroke-width="1"/>
  <!-- lantern body -->
  <rect x="27" y="71" width="9" height="11" rx="1" fill="#5a3d1e"/>
  <rect x="28.5" y="72.5" width="6" height="8" fill="#ffcf6b"/>
  <ellipse cx="31.5" cy="76.5" rx="2.2" ry="3" fill="#fff2b0"/>
  <!-- glow -->
  <circle cx="31.5" cy="76.5" r="13" fill="#ffcf6b" opacity="0.15"/>
  <circle cx="31.5" cy="76.5" r="7" fill="#ffcf6b" opacity="0.15"/>
</svg>
