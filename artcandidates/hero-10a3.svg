<svg xmlns="http://www.w3.org/2000/svg" viewBox="21 17 53 74" width="100" height="100">
  <!-- 10a3: from 10a2 —
       (1) arrows shifted right so all three seat inside the quiver mouth,
       (2) the RIGHT arm raised and given a SECOND (forearm) segment bent
           slightly inward, so it no longer looks cut off at the elbow,
       (3) the LEFT (lantern) arm nudged down ~2 (about 1/4 of the earlier
           7-up raise), as a unit with the hand + lantern. -->
  <title>Hero 10a3 — two-segment right arm, seated arrows, left arm eased down</title>

  <!-- shadow, centered under the feet -->
  <ellipse cx="50" cy="88" rx="17" ry="3.6" fill="#000" opacity="0.35"/>

  <!-- BACK GEAR (behind body; inner edges overlapped by the tunic) -->
  <!-- bow: diagonal across the back, behind the viewer-LEFT shoulder -->
  <path d="M40 44 Q36 57 46 71" fill="none" stroke="#6b4c26" stroke-width="2.5"/>
  <line x1="40" y1="44" x2="46" y2="71" stroke="#d8d2c0" stroke-width="0.7"/>
  <!-- quiver behind the viewer-RIGHT shoulder; arrows shifted right (+3) to
       seat inside the quiver mouth -->
  
  <line x1="62.5" y1="53" x2="68.5" y2="42.5" stroke="#8a6a3a" stroke-width="1"/>
  <line x1="61.5" y1="52" x2="66" y2="41" stroke="#8a6a3a" stroke-width="1"/>
  <line x1="60" y1="51" x2="63" y2="40" stroke="#8a6a3a" stroke-width="1"/>
  <rect x="56" y="50" width="6" height="17" rx="2" fill="#5a3d1e" transform="rotate(18 59 58)"/>
  <!-- stubby legs -->
  <path d="M45 70 L43 84 L49 84 L50 71 Z" fill="#5a4327"/>
  <path d="M55 70 L57 84 L51 84 L50 71 Z" fill="#4c3820"/>
  <ellipse cx="45" cy="85.5" rx="4" ry="2.5" fill="#3a2b18"/>
  <ellipse cx="55" cy="85.5" rx="4" ry="2.5" fill="#312414"/>

  <!-- tunic body (drawn over the inner edges of bow/quiver) -->
  <path d="M42 56 Q50 53 58 56 L56 71 Q50 74 44 71 Z" fill="#3f7d3a"/>
  <path d="M44 69 L47 73 L50 69 L53 73 L56 71 Q50 74 44 71 Z" fill="#356b31"/>
  <rect x="43" y="66" width="14" height="3" fill="#5a3d1e"/>

  <!-- NECK (between head and collar) -->
  <rect x="46" y="50" width="7" height="7" rx="1.5" fill="#d9a978"/>

  <!-- RIGHT arm: two segments, thickened to match the left arm (~4 units).
       Upper arm from the shoulder (~57), forearm bent slightly INWARD toward
       the body, ending near the hip. -->
  <path d="M56 55 L63 61 L61 65 L54 59 Z" fill="#c98d5a"/>            <!-- upper arm (a hair thicker) -->
  <path d="M63 61 L60 69 L57 68 L60 61 Z" fill="#bf8351"/>            <!-- forearm, angled in (slightly narrowed) -->
  <circle cx="58" cy="69" r="2.4" fill="#d9a978"/>                    <!-- hand -->

  <!-- BIG head -->
  <circle cx="49" cy="38" r="14" fill="#e0b083"/>
  <!-- hair: drawn BEFORE the hood, so it sits UNDER the cap (cap overlaps its
       top) but ON TOP of the skin. Bigger and higher — a full mass across the
       crown with a scalloped fringe peeking below the brim. -->
  <path d="M37 33 Q35 22 49 21 Q63 22 61 33 L58 35 Q55 32 52 35 Q49 31 46 35 Q43 32 40 35 Z" fill="#8a6a3a"/>
  <!-- hood / cap (over the hair's top) -->
  <path d="M35 39 Q34 20 49 20 Q64 20 63 37 L58 32 Q49 26 41 33 Z" fill="#3f7d3a"/>
  <circle cx="45" cy="40" r="2" fill="#2a2018"/>
  <circle cx="54" cy="40" r="2" fill="#2a2018"/>
  <circle cx="45.6" cy="39.3" r="0.6" fill="#fff"/>
  <circle cx="54.6" cy="39.3" r="0.6" fill="#fff"/>
  <!-- brows: nearly level, a slight determined set (not angled down = not angry) -->
  <path d="M42 37 L47 37.4" fill="none" stroke="#5a3d1e" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M57 37 L52 37.4" fill="none" stroke="#5a3d1e" stroke-width="1.4" stroke-linecap="round"/>
  <!-- nose: a small soft shadow line below/between the eyes -->
  <path d="M49.5 42 L48.5 45.5 L50.5 45.5 Z" fill="#cf9a6b"/>
  <!-- mouth: an upturned, confident set — a small resolute smile -->
  <path d="M46 48 Q49.5 50.2 53 48" fill="none" stroke="#7a4a30" stroke-width="1.3" stroke-linecap="round"/>

  <!-- LEFT (front) arm + lantern, nudged DOWN ~2 from 10a2 (still near the
       shoulder, ~1/4 of the earlier raise reversed) -->
  <path d="M45 55 L31 58 L32 62 L46 60 Z" fill="#c98d5a"/>
  <circle cx="31.5" cy="60" r="2.4" fill="#d9a978"/>

  <!-- LANTERN, hanging BELOW the hand -->
  <line x1="31.5" y1="61.5" x2="31.5" y2="65" stroke="#3a2b18" stroke-width="0.8"/>
  <path d="M27.5 66 Q31.5 61 35.5 66" fill="none" stroke="#5a3d1e" stroke-width="1"/>
  <rect x="27" y="66" width="9" height="11" rx="1" fill="#5a3d1e"/>
  <rect x="28.5" y="67.5" width="6" height="8" fill="#ffcf6b"/>
  <ellipse cx="31.5" cy="71.5" rx="2.2" ry="3" fill="#fff2b0"/>
  <circle cx="31.5" cy="71.5" r="13" fill="#ffcf6b" opacity="0.15"/>
  <circle cx="31.5" cy="71.5" r="7" fill="#ffcf6b" opacity="0.15"/>
</svg>
