<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 10c: same four fixes, third variant — the lantern hangs from a bent
       elbow held CLOSER to the body (lantern lower and nearer, casting light
       right at the feet), a visible neck with a small hood-collar, and the
       bow/quiver clearly reading as slung. A tighter, sturdier silhouette. -->
  <title>Hero 10c — chibi delver, fixes (close lantern, collar)</title>

  <ellipse cx="50" cy="88" rx="17" ry="3.6" fill="#000" opacity="0.35"/>

  <!-- bow diagonal across back -->
  <path d="M34 43 Q29 58 40 73" fill="none" stroke="#6b4c26" stroke-width="2.5"/>
  <line x1="34" y1="43" x2="40" y2="73" stroke="#d8d2c0" stroke-width="0.7"/>
  <!-- quiver behind right shoulder -->
  <rect x="60" y="45" width="6" height="17" rx="2" fill="#5a3d1e" transform="rotate(18 63 53)"/>
  <line x1="66" y1="46" x2="71" y2="38" stroke="#8a6a3a" stroke-width="1"/>
  <line x1="64" y1="45" x2="68" y2="36" stroke="#8a6a3a" stroke-width="1"/>
  <line x1="62" y1="45" x2="65" y2="35" stroke="#8a6a3a" stroke-width="1"/>

  <!-- legs -->
  <path d="M45 70 L43 84 L49 84 L50 71 Z" fill="#5a4327"/>
  <path d="M55 70 L57 84 L51 84 L50 71 Z" fill="#4c3820"/>
  <ellipse cx="45" cy="85.5" rx="4" ry="2.5" fill="#3a2b18"/>
  <ellipse cx="55" cy="85.5" rx="4" ry="2.5" fill="#312414"/>

  <!-- tunic -->
  <path d="M42 56 Q50 53 58 56 L56 71 Q50 74 44 71 Z" fill="#3f7d3a"/>
  <path d="M44 69 L47 73 L50 69 L53 73 L56 71 Q50 74 44 71 Z" fill="#356b31"/>
  <rect x="43" y="66" width="14" height="3" fill="#5a3d1e"/>

  <!-- neck + a small hood-collar around it -->
  <rect x="46" y="50" width="7" height="7" rx="1.5" fill="#d9a978"/>
  <path d="M43 55 Q49.5 52 56 55 L54 58 Q49.5 56 45 58 Z" fill="#356b31"/>

  <!-- rear arm -->
  <path d="M56 58 L60 66 L57 67 L53 60 Z" fill="#c98d5a"/>

  <!-- head + hood -->
  <circle cx="49" cy="38" r="14" fill="#e0b083"/>
  <path d="M35 39 Q34 20 49 20 Q64 20 63 37 L58 32 Q49 26 41 33 Z" fill="#3f7d3a"/>
  <path d="M38 34 Q49 29 60 34 L57 38 Q49 34 41 38 Z" fill="#8a6a3a"/>
  <circle cx="45" cy="40" r="2" fill="#2a2018"/>
  <circle cx="54" cy="40" r="2" fill="#2a2018"/>
  <circle cx="45.6" cy="39.3" r="0.6" fill="#fff"/>
  <circle cx="54.6" cy="39.3" r="0.6" fill="#fff"/>

  <!-- front arm bent, lantern held closer/lower -->
  <path d="M45 60 L37 64 L38 68 L46 66 Z" fill="#c98d5a"/>
  <circle cx="37.5" cy="66" r="2.4" fill="#d9a978"/>

  <!-- lantern hangs just below the near hand -->
  <line x1="37.5" y1="67.5" x2="37.5" y2="71" stroke="#3a2b18" stroke-width="0.8"/>
  <path d="M33.5 72 Q37.5 67 41.5 72" fill="none" stroke="#5a3d1e" stroke-width="1"/>
  <rect x="33" y="72" width="9" height="11" rx="1" fill="#5a3d1e"/>
  <rect x="34.5" y="73.5" width="6" height="8" fill="#ffcf6b"/>
  <ellipse cx="37.5" cy="77.5" rx="2.2" ry="3" fill="#fff2b0"/>
  <circle cx="37.5" cy="77.5" r="13" fill="#ffcf6b" opacity="0.15"/>
  <circle cx="37.5" cy="77.5" r="7" fill="#ffcf6b" opacity="0.15"/>
</svg>
