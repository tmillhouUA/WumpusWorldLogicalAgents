<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 03: a golden goblet amid scattered gems and coins — a richer, more
       varied treasure spread. Rays glint off the goblet. -->
  <title>Hoard 03 — goblet &amp; gems</title>

  <g stroke="#ffe9a0" stroke-linecap="round" opacity="0.5">
    <line x1="50" y1="40" x2="50" y2="8" stroke-width="2.2"/>
    <line x1="50" y1="40" x2="36" y2="14" stroke-width="1.5"/>
    <line x1="50" y1="40" x2="64" y2="14" stroke-width="1.5"/>
    <line x1="50" y1="40" x2="26" y2="26" stroke-width="1.1"/>
    <line x1="50" y1="40" x2="74" y2="26" stroke-width="1.1"/>
  </g>
  <circle cx="50" cy="58" r="28" fill="#f0c040" opacity="0.1"/>

  <ellipse cx="50" cy="86" rx="34" ry="6" fill="#000" opacity="0.3"/>

  <!-- coin bed -->
  <path d="M16 80 Q50 68 84 80 Q50 90 16 80 Z" fill="#c9a84c"/>
  <g fill="#f0c040" stroke="#a8822e" stroke-width="0.7">
    <ellipse cx="26" cy="82" rx="5" ry="2.5"/>
    <ellipse cx="74" cy="82" rx="5" ry="2.5"/>
    <ellipse cx="38" cy="85" rx="5" ry="2.5"/>
    <ellipse cx="62" cy="85" rx="5" ry="2.5"/>
  </g>

  <!-- goblet -->
  <path d="M42 44 Q50 60 58 44 Z" fill="#f0c040" stroke="#a8822e" stroke-width="0.8"/>
  <path d="M44 46 Q50 56 56 46 Z" fill="#ffe9a0" opacity="0.5"/>
  <rect x="49" y="56" width="2" height="10" fill="#c9a84c"/>
  <ellipse cx="50" cy="68" rx="7" ry="2.5" fill="#c9a84c" stroke="#a8822e" stroke-width="0.7"/>
  <ellipse cx="50" cy="44" rx="8" ry="2.4" fill="#e0b83e" stroke="#a8822e" stroke-width="0.7"/>

  <!-- gems -->
  <polygon points="30,72 34,75 32,80 28,80 26,75" fill="#3a9ad0" stroke="#2a6a9a" stroke-width="0.6"/>
  <polygon points="70,72 74,75 72,80 68,80 66,75" fill="#c0392b" stroke="#8a2418" stroke-width="0.6"/>
  <polygon points="50,74 53,76.5 51.5,80 48.5,80 47,76.5" fill="#2a8a4a" stroke="#1a5a30" stroke-width="0.6"/>

  <g fill="#fff6d8"><circle cx="48" cy="48" r="1"/><circle cx="31" cy="74" r="0.8"/><circle cx="71" cy="74" r="0.8"/></g>
</svg>
