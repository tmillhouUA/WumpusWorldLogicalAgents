<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 04: a jeweled crown resting on a bed of coins — a single iconic
       centerpiece, reads instantly as "the prize". Strong rays behind. -->
  <title>Hoard 04 — jeweled crown</title>

  <g stroke="#ffe9a0" stroke-linecap="round" opacity="0.55">
    <line x1="50" y1="50" x2="50" y2="8" stroke-width="2.6"/>
    <line x1="50" y1="50" x2="32" y2="14" stroke-width="1.6"/>
    <line x1="50" y1="50" x2="68" y2="14" stroke-width="1.6"/>
    <line x1="50" y1="50" x2="18" y2="32" stroke-width="1.3"/>
    <line x1="50" y1="50" x2="82" y2="32" stroke-width="1.3"/>
    <line x1="50" y1="50" x2="14" y2="52" stroke-width="1"/>
    <line x1="50" y1="50" x2="86" y2="52" stroke-width="1"/>
  </g>
  <circle cx="50" cy="54" r="30" fill="#f0c040" opacity="0.12"/>

  <ellipse cx="50" cy="84" rx="32" ry="6" fill="#000" opacity="0.3"/>

  <!-- coin bed -->
  <path d="M20 78 Q50 66 80 78 Q50 88 20 78 Z" fill="#c9a84c"/>
  <g fill="#f0c040" stroke="#a8822e" stroke-width="0.7">
    <ellipse cx="30" cy="80" rx="5" ry="2.5"/>
    <ellipse cx="70" cy="80" rx="5" ry="2.5"/>
    <ellipse cx="50" cy="83" rx="5" ry="2.5"/>
  </g>

  <!-- crown -->
  <path d="M32 68 L34 48 L42 58 L50 44 L58 58 L66 48 L68 68 Z"
        fill="#f0c040" stroke="#a8822e" stroke-width="1"/>
  <rect x="32" y="66" width="36" height="5" rx="1" fill="#e0b83e" stroke="#a8822e" stroke-width="1"/>
  <!-- crown jewels -->
  <circle cx="34" cy="48" r="2.2" fill="#c0392b" stroke="#8a2418" stroke-width="0.5"/>
  <circle cx="50" cy="44" r="2.6" fill="#3a9ad0" stroke="#2a6a9a" stroke-width="0.5"/>
  <circle cx="66" cy="48" r="2.2" fill="#2a8a4a" stroke="#1a5a30" stroke-width="0.5"/>
  <circle cx="42" cy="64" r="1.8" fill="#c0392b" stroke="#8a2418" stroke-width="0.5"/>
  <circle cx="58" cy="64" r="1.8" fill="#2a8a4a" stroke="#1a5a30" stroke-width="0.5"/>
  <g fill="#fff6d8"><circle cx="49" cy="43" r="1"/><circle cx="40" cy="56" r="0.8"/></g>
</svg>
