<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 05: a single large faceted golden gem/jewel on a small coin pile — the
       most minimal, reads clearly at tiny size. Bold star-glint on the gem. -->
  <title>Hoard 05 — great gem</title>

  <g stroke="#ffe9a0" stroke-linecap="round" opacity="0.5">
    <line x1="50" y1="50" x2="50" y2="10" stroke-width="2.4"/>
    <line x1="50" y1="50" x2="34" y2="16" stroke-width="1.5"/>
    <line x1="50" y1="50" x2="66" y2="16" stroke-width="1.5"/>
    <line x1="50" y1="50" x2="20" y2="34" stroke-width="1.2"/>
    <line x1="50" y1="50" x2="80" y2="34" stroke-width="1.2"/>
  </g>
  <circle cx="50" cy="52" r="26" fill="#f0c040" opacity="0.12"/>

  <ellipse cx="50" cy="84" rx="28" ry="5" fill="#000" opacity="0.3"/>

  <!-- small coin pile -->
  <path d="M26 78 Q50 68 74 78 Q50 86 26 78 Z" fill="#c9a84c"/>
  <g fill="#f0c040" stroke="#a8822e" stroke-width="0.7">
    <ellipse cx="36" cy="80" rx="5" ry="2.5"/>
    <ellipse cx="64" cy="80" rx="5" ry="2.5"/>
  </g>

  <!-- big faceted gem (gold-amber) -->
  <polygon points="50,40 66,54 58,72 42,72 34,54"
           fill="#f0c040" stroke="#a8822e" stroke-width="1.2"/>
  <!-- facets -->
  <polygon points="50,40 66,54 50,58 34,54" fill="#ffe07a"/>
  <polygon points="34,54 50,58 42,72" fill="#e0b83e"/>
  <polygon points="66,54 50,58 58,72" fill="#d8a832"/>
  <polygon points="42,72 50,58 58,72" fill="#c9a84c"/>
  <line x1="50" y1="40" x2="50" y2="58" stroke="#a8822e" stroke-width="0.5"/>

  <!-- bold star glint -->
  <g fill="#fff6d8">
    <path d="M46 50 L47.4 53.6 L51 55 L47.4 56.4 L46 60 L44.6 56.4 L41 55 L44.6 53.6 Z"/>
    <circle cx="58" cy="62" r="1"/>
  </g>
</svg>
