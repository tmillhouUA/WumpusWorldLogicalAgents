<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 06: a wide, low spill of coins across the floor with a couple of gems —
       covers more of the room, "a floor strewn with gold". Fanned rays. -->
  <title>Hoard 06 — wide coin spill</title>

  <g stroke="#ffe9a0" stroke-linecap="round" opacity="0.45">
    <line x1="50" y1="60" x2="50" y2="16" stroke-width="2.2"/>
    <line x1="50" y1="60" x2="32" y2="22" stroke-width="1.4"/>
    <line x1="50" y1="60" x2="68" y2="22" stroke-width="1.4"/>
    <line x1="50" y1="60" x2="20" y2="40" stroke-width="1.1"/>
    <line x1="50" y1="60" x2="80" y2="40" stroke-width="1.1"/>
  </g>
  <ellipse cx="50" cy="72" rx="38" ry="16" fill="#f0c040" opacity="0.1"/>

  <ellipse cx="50" cy="82" rx="40" ry="7" fill="#000" opacity="0.28"/>

  <!-- low spread of coins -->
  <g fill="#f0c040" stroke="#a8822e" stroke-width="0.7">
    <ellipse cx="20" cy="80" rx="6" ry="3"/>
    <ellipse cx="32" cy="83" rx="6" ry="3"/>
    <ellipse cx="45" cy="80" rx="6" ry="3"/>
    <ellipse cx="58" cy="83" rx="6" ry="3"/>
    <ellipse cx="70" cy="80" rx="6" ry="3"/>
    <ellipse cx="80" cy="82" rx="6" ry="3"/>
    <ellipse cx="26" cy="76" rx="5.5" ry="2.7"/>
    <ellipse cx="40" cy="74" rx="5.5" ry="2.7"/>
    <ellipse cx="52" cy="75" rx="5.5" ry="2.7"/>
    <ellipse cx="64" cy="74" rx="5.5" ry="2.7"/>
    <ellipse cx="74" cy="76" rx="5.5" ry="2.7"/>
    <ellipse cx="46" cy="70" rx="5" ry="2.5"/>
    <ellipse cx="58" cy="70" rx="5" ry="2.5"/>
  </g>
  <!-- a couple of gems nestled in -->
  <polygon points="34,72 37,74 36,78 32,78 31,74" fill="#3a9ad0" stroke="#2a6a9a" stroke-width="0.5"/>
  <polygon points="66,72 69,74 68,78 64,78 63,74" fill="#c0392b" stroke="#8a2418" stroke-width="0.5"/>

  <g fill="#fff6d8"><circle cx="45" cy="79" r="0.9"/><circle cx="59" cy="82" r="0.9"/><circle cx="71" cy="79" r="0.9"/></g>
</svg>
