<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 07: a tall dragon-hoard mound — coins heaped high with gems, goblet, and
       a crown poking out near the top. The "overflowing riches" option. -->
  <title>Hoard 07 — tall heaped mound</title>

  <g stroke="#ffe9a0" stroke-linecap="round" opacity="0.5">
    <line x1="50" y1="34" x2="50" y2="6" stroke-width="2.2"/>
    <line x1="50" y1="34" x2="36" y2="12" stroke-width="1.4"/>
    <line x1="50" y1="34" x2="64" y2="12" stroke-width="1.4"/>
    <line x1="38" y1="46" x2="24" y2="30" stroke-width="1.1"/>
    <line x1="62" y1="46" x2="76" y2="30" stroke-width="1.1"/>
  </g>
  <circle cx="50" cy="56" r="32" fill="#f0c040" opacity="0.1"/>

  <ellipse cx="50" cy="88" rx="36" ry="6" fill="#000" opacity="0.3"/>

  <!-- big mound -->
  <path d="M14 84 Q50 40 86 84 Q50 94 14 84 Z" fill="#a8822e"/>
  <path d="M20 82 Q50 46 80 82 Q50 90 20 82 Z" fill="#c9a84c"/>
  <path d="M30 78 Q50 52 70 78 Q50 84 30 78 Z" fill="#e0b83e"/>

  <!-- crown at the peak -->
  <path d="M42 50 L43 42 L47 47 L50 40 L53 47 L57 42 L58 50 Z" fill="#f0c040" stroke="#a8822e" stroke-width="0.8"/>
  <circle cx="50" cy="41" r="1.6" fill="#3a9ad0" stroke="#2a6a9a" stroke-width="0.4"/>

  <!-- gems + coins scattered on the slope -->
  <g fill="#f0c040" stroke="#a8822e" stroke-width="0.7">
    <ellipse cx="28" cy="82" rx="5" ry="2.5"/>
    <ellipse cx="72" cy="82" rx="5" ry="2.5"/>
    <ellipse cx="40" cy="85" rx="5" ry="2.5"/>
    <ellipse cx="60" cy="85" rx="5" ry="2.5"/>
    <ellipse cx="50" cy="70" rx="5" ry="2.4"/>
  </g>
  <polygon points="36,72 39,74 38,78 34,78 33,74" fill="#c0392b" stroke="#8a2418" stroke-width="0.5"/>
  <polygon points="64,72 67,74 66,78 62,78 61,74" fill="#2a8a4a" stroke="#1a5a30" stroke-width="0.5"/>
  <polygon points="50,60 53,62 52,66 48,66 47,62" fill="#3a9ad0" stroke="#2a6a9a" stroke-width="0.5"/>

  <g fill="#fff6d8"><circle cx="49" cy="59" r="0.9"/><circle cx="37" cy="80" r="0.9"/><circle cx="63" cy="81" r="0.9"/></g>
</svg>
