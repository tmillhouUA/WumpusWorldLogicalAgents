    <svg x="39.5" y="-10" width="11.0" height="23" viewBox="0 0 11.0 23" overflow="hidden">
      <path d="M7.3 35.0 L5.5 34.0 L3.8 33.0 L2.5 32.0 L2.0 31.0 L2.5 30.0 L3.8 29.0 L5.5 28.0 L7.2 27.0 L8.5 26.0 L9.0 25.0 L8.5 24.0 L7.2 23.0 L5.5 22.0 L3.7 21.0 L2.5 20.0 L2.0 19.0 L2.5 18.0 L3.7 17.0 L5.5 16.0 L7.3 15.0 L8.5 14.0 L9.0 13.0 L8.5 12.0 L7.3 11.0 L5.5 10.0 L3.8 9.0 L2.5 8.0 L2.0 7.0 L2.5 6.0 L3.8 5.0 L5.5 4.0 L7.3 3.0 L8.5 2.0 L9.0 1.0 L8.5 0.0 L7.3 -1.0 L5.5 -2.0 L3.8 -3.0 L2.5 -4.0 L2.0 -5.0 L2.5 -6.0 L3.8 -7.0 L5.5 -8.0 L7.2 -9.0 L8.5 -10.0 L9.0 -11.0 L8.5 -12.0" fill="none" stroke="#8a9a5a" stroke-width="1.6" stroke-linecap="round">
