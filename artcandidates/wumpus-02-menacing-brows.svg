<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -12 100 112" width="100" height="112">
  <!-- 02: menacing. Same anatomy, but angry down-slanted brows, a wider snarl
       with four fangs, red-tinged eyes, arms raised threateningly. -->
  <title>Wumpus 02 — menacing snarl</title>

  <!-- stench wisps WAFTING UPWARD (6): each is its OWN nested <svg> (own
       coordinate space + viewport; overflow:hidden clips it to its window).
       Inside, a tall sine wave scrolls up one wavelength on a loop — seamless.
