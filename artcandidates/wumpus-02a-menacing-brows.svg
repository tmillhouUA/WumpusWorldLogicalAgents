<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 02: menacing. Same anatomy, but angry down-slanted brows, a wider snarl
       with four fangs, red-tinged eyes, arms raised threateningly. -->
  <title>Wumpus 02 — menacing snarl</title>
  <ellipse cx="50" cy="94" rx="30" ry="5" fill="#000" opacity="0.35"/>

  <rect x="40" y="82" width="5" height="9" fill="#3f4a29"/>
  <rect x="55" y="82" width="5" height="9" fill="#3f4a29"/>
  <ellipse cx="38" cy="92" rx="11" ry="4.5" fill="#4a5730"/>
  <ellipse cx="62" cy="92" rx="11" ry="4.5" fill="#4a5730"/>

  <!-- arms raised (claws up); inner ends extended to overlap the body so they
       don't stop shy of it -->
  <path d="M28 48 Q13 40 9 42 Q13 48 27 52 Z" fill="#5a6b3a"/>
  <path d="M72 48 Q87 40 91 42 Q87 48 73 52 Z" fill="#5a6b3a"/>
  <path d="M9 42 l-2 -3 M12 41 l-1 -3 M15 41 l0 -3" stroke="#3f4a29" stroke-width="1"/>
  <path d="M91 42 l2 -3 M88 41 l1 -3 M85 41 l0 -3" stroke="#3f4a29" stroke-width="1"/>

  <!-- body: domed top, with the two BOTTOM corners slightly rounded (radius ~7,
       about 1/4 of the top curve). Left side drops, curves into the bottom edge,
       runs across, curves up into the right side. -->
  <path d="M22 78 Q18 20 50 18 Q82 20 78 78
           L78 78 Q78 85 71 85 L29 85 Q22 85 22 78 Z" fill="#556635"/>
  <path d="M28 77 Q26 30 50 28 Q74 30 72 77
           Q72 83 67 83 L33 83 Q28 83 28 77 Z" fill="#61733a"/>

  <ellipse cx="39" cy="49" rx="7" ry="8" fill="#f4d0d0"/>
  <ellipse cx="61" cy="49" rx="7" ry="8" fill="#f4d0d0"/>
  <circle cx="40" cy="50" r="3.4" fill="#cc6633"/>
  <circle cx="60" cy="50" r="3.4" fill="#cc6633"/>
  <circle cx="40" cy="50" r="1.5" fill="#1a0808"/>
  <circle cx="60" cy="50" r="1.5" fill="#1a0808"/>

  <!-- angry brows, steep — drawn AFTER the eyes so they sit on top -->
  <path d="M31 38 L45 44" fill="none" stroke="#2a331a" stroke-width="3" stroke-linecap="round"/>
  <path d="M69 38 L55 44" fill="none" stroke="#2a331a" stroke-width="3" stroke-linecap="round"/>

  <!-- snarl, four fangs -->
  <path d="M35 61 Q50 71 65 61 Q50 66 35 61 Z" fill="#2a1010"/>
  <!-- two big fangs, hanging DOWN from inside the mouth (tops below the upper
       lip so they don't poke above it) -->
  <polygon points="41,63 47,63 44,71" fill="#f4ecd0"/>
  <polygon points="53,63 59,63 56,71" fill="#f4ecd0"/>
</svg>
