<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 05: proportion variant — a taller, narrower gumdrop (more looming),
       higher-set arms, longer feet. Same green hide, brooding half-lidded
       eyes. -->
  <title>Wumpus 05 — tall looming gumdrop</title>
  <ellipse cx="50" cy="93" rx="21" ry="4" fill="#000" opacity="0.35"/>

  <rect x="42" y="77" width="4.5" height="6" fill="#3f4a29"/>
  <rect x="53.5" y="77" width="4.5" height="6" fill="#3f4a29"/>
  <ellipse cx="39" cy="87" rx="12" ry="4" fill="#4a5730"/>
  <ellipse cx="61" cy="87" rx="12" ry="4" fill="#4a5730"/>

  <!-- arms higher up the narrower body -->
  <path d="M28 46 Q18 42 14 46 Q18 50 28 50 Z" fill="#5a6b3a"/>
  <path d="M72 46 Q82 42 86 46 Q82 50 72 50 Z" fill="#5a6b3a"/>

  <path d="M28 78 Q24 16 50 14 Q76 16 72 78 Z" fill="#5a6b3a"/>
  <path d="M33 76 Q31 26 50 24 Q69 26 67 76 Z" fill="#66783f"/>

  <path d="M35 40 L45 43" fill="none" stroke="#2f3a1c" stroke-width="2.4" stroke-linecap="round"/>
  <path d="M65 40 L55 43" fill="none" stroke="#2f3a1c" stroke-width="2.4" stroke-linecap="round"/>

  <!-- half-lidded brooding eyes -->
  <ellipse cx="42" cy="49" rx="6.5" ry="7" fill="#f4ecd0"/>
  <ellipse cx="58" cy="49" rx="6.5" ry="7" fill="#f4ecd0"/>
  <path d="M35.5 46 Q42 44 48.5 46 L48.5 49 L35.5 49 Z" fill="#5a6b3a"/>
  <path d="M51.5 46 Q58 44 64.5 46 L64.5 49 L51.5 49 Z" fill="#5a6b3a"/>
  <circle cx="42" cy="51" r="3.1" fill="#c9a84c"/>
  <circle cx="58" cy="51" r="3.1" fill="#c9a84c"/>
  <circle cx="42" cy="51" r="1.4" fill="#1a1408"/>
  <circle cx="58" cy="51" r="1.4" fill="#1a1408"/>

  <path d="M40 62 Q50 68 60 62 Q50 65 40 62 Z" fill="#2a1818"/>
  <polygon points="43,62.5 47,62.5 45,68" fill="#f4ecd0"/>
  <polygon points="53,62.5 57,62.5 55,68" fill="#f4ecd0"/>
</svg>
