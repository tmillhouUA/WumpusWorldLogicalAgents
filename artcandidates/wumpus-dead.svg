  <!-- arms drooping limp down the sides (not raised) -->
  <path d="M26 52 Q16 60 12 70 Q17 71 21 62 Q25 56 30 55 Z" fill="#5a6b3a"/>
  <path d="M74 52 Q84 60 88 70 Q83 71 79 62 Q75 56 70 55 Z" fill="#5a6b3a"/>

