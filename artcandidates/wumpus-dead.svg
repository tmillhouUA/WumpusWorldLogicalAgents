    <line x1="44" y1="44" x2="34" y2="54"/>
    <line x1="56" y1="44" x2="66" y2="54"/>
    <line x1="66" y1="44" x2="56" y2="54"/>
  </g>

  <!-- INVERTED mouth (downturned frown), no tongue -->
  <path d="M35 68 Q50 58 65 68 Q50 63 35 68 Z" fill="#2a1010"/>
  <!-- fangs kept in their ORIGINAL positions -->
  <polygon points="41,65 47,63 44,71" fill="#f4ecd0"/>
  <polygon points="53,63 59,65 56,71" fill="#f4ecd0"/>


   <!-- SEATED: no legs; feet lifted and thrust out ahead (toes up), as if slumped
       sitting with legs extended forward -->
  <ellipse cx="33" cy="80" rx="12" ry="5" fill="#4a5730" transform="rotate(-14 33 80)"/>
  <ellipse cx="67" cy="80" rx="12" ry="5" fill="#4a5730" transform="rotate(14 67 80)"/>

