<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dungeon of the Wumpus</title>

  <!-- Self-hosted webfonts (fonts/fonts.css) — offline/portable, no network
       dependency once loaded. Each face uses font-display: block, so a brief
       load holds text invisible rather than showing it in a fallback font —
       avoids the pop-in flash a remote stylesheet (or font-display: swap)
       causes. All three are SIL OFL, so bundling is fine.
         UnifrakturMaguntia -> blackletter title
         Cinzel             -> panel/section titles + labels
         Share Tech Mono    -> body text, KB formulas, resolution lines -->
  <link rel="stylesheet" href="fonts/fonts.css" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Title bar: blackletter title + tagline, flanked by rune pseudo-elements
       (see #site-header in style.css). Decorative only. -->
  <header id="site-header">
    <h1 class="site-title">Dungeon of the Wumpus</h1>
    <p class="site-subtitle">Defeat the Wumpus and Steal His Golden Hoard</p>
  </header>

  <!--
    Five panels, per the current layout (see #kb-panel etc. in style.css):
      - #kb-panel      : left-upper, the agent's knowledge base
      - #control-panel : left-lower, controls + explanation (mode-dependent)
      - #game-panel    : center, the game world (focal point)
      - #solver-panel  : right-upper, the resolution solver
      - #ask-panel     : right-lower, the manual query ("ASK") tool
  -->
  <div id="app">
    <section id="kb-panel"      class="panel"><h2>Knowledge Base</h2></section>
    <section id="ask-panel"     class="panel"><h2>Ask</h2></section>
    <section id="game-panel"    class="panel"><h2>Wumpus World</h2></section>
    <section id="solver-panel"  class="panel"><h2>Resolution Solver</h2></section>
    <section id="control-panel" class="panel"><h2>Controls</h2></section>
  </div>

  <!-- Classic scripts, loaded in dependency order. logic.js defines WW; -->
  <!-- ui.js consumes it.                                                 -->
  <script src="logic.js"></script>
  <script src="ui.js"></script>
</body>
</html>
